<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phaser 2D RPG Demo</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: #111;
      overflow: hidden;
    }

    body {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      font-family: Arial, sans-serif;
    }

    #game-container {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      touch-action: none;
    }

    #game-container canvas {
      display: block;
    }
  </style>
</head>

<body>
  <div id="game-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
  <script type="module" src="./game.js"></script>
</body>

</html>
